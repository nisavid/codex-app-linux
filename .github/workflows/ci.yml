name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CI_PACKAGE_VERSION: 2026.04.28.000000+ci${{ github.run_number }}

jobs:
  rust-and-smoke:
    name: Rust and Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Check shell syntax
        run: |
          set -euo pipefail
          bash -n install.sh
          bash -n scripts/install-deps.sh
          bash -n scripts/build-deb.sh
          bash -n scripts/build-rpm.sh
          bash -n scripts/build-pacman.sh
          bash -n tests/fixtures/create-packaged-app-fixture.sh
          bash -n tests/scripts_smoke.sh
          bash -n launcher/start.sh.template
          bash -n scripts/lib/*.sh
          bash -n packaging/linux/codex-app-updater-user-service.sh
          bash -n packaging/linux/codex-app-updater.postinst
          bash -n packaging/linux/codex-app-updater.prerm
          bash -n packaging/linux/codex-app-updater.postrm
          bash -n packaging/linux/codex-packaged-runtime.sh
          bash -n contrib/user-local-install/install-user-local.sh
          bash -n contrib/user-local-install/files/.local/bin/codex-app
          bash -n contrib/user-local-install/files/.local/bin/codex-app-check-update
          bash -n contrib/user-local-install/files/.local/bin/codex-app-update
          bash -n contrib/user-local-install/files/.local/bin/codex-app-version
          bash -n contrib/user-local-install/files/share/common.sh

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust checks
        run: cargo check --workspace --all-targets

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

      - name: Run script smoke tests
        run: |
          set -euo pipefail
          bash tests/scripts_smoke.sh
          {
            echo "## Rust and Smoke Tests"
            echo ""
            echo "- Shell syntax checks passed."
            echo "- Rust formatting, clippy, check, and tests passed."
            echo "- Script smoke tests passed."
          } >> "$GITHUB_STEP_SUMMARY"

  package-deb:
    name: Build Debian Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create minimal packaged app fixture
        run: |
          set -euo pipefail
          rm -rf codex-app dist
          tests/fixtures/create-packaged-app-fixture.sh codex-app

      - name: Build Debian package
        run: PACKAGE_VERSION="$CI_PACKAGE_VERSION" ./scripts/build-deb.sh

      - name: Inspect Debian package
        run: |
          set -euo pipefail
          deb_file="$(find dist -maxdepth 1 -name 'codex-app_*.deb' -print -quit)"
          test -n "$deb_file"
          dpkg-deb -I "$deb_file"
          dpkg-deb -c "$deb_file" | tee /tmp/deb-contents.txt >/dev/null
          grep -q './usr/bin/codex-app-updater' /tmp/deb-contents.txt
          grep -q './usr/lib/systemd/user/codex-app-updater.service' /tmp/deb-contents.txt
          grep -q './usr/lib/codex-app/update-builder/install.sh' /tmp/deb-contents.txt
          grep -q './usr/lib/codex-app/packaged-runtime.sh' /tmp/deb-contents.txt
          {
            echo "## Debian Package Validation"
            echo ""
            echo "- Built: \`$(basename "$deb_file")\`"
            echo "- Verified updater binary, user service, update-builder bundle, and packaged runtime helper."
          } >> "$GITHUB_STEP_SUMMARY"

  package-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rpm
          rpmbuild --version

      - name: Create minimal packaged app fixture
        run: |
          set -euo pipefail
          rm -rf codex-app dist
          tests/fixtures/create-packaged-app-fixture.sh codex-app

      - name: Build RPM package
        run: PACKAGE_VERSION="$CI_PACKAGE_VERSION" ./scripts/build-rpm.sh

      - name: Inspect RPM package
        run: |
          set -euo pipefail
          rpm_file="$(find dist -maxdepth 1 -name 'codex-app-*.rpm' -print -quit)"
          test -n "$rpm_file"
          rpm -qip "$rpm_file"
          rpm -qlp "$rpm_file" | tee /tmp/rpm-contents.txt >/dev/null
          grep -q '/usr/bin/codex-app-updater' /tmp/rpm-contents.txt
          grep -q '/usr/lib/systemd/user/codex-app-updater.service' /tmp/rpm-contents.txt
          grep -q '/usr/lib/codex-app/update-builder/install.sh' /tmp/rpm-contents.txt
          grep -q '/usr/lib/codex-app/packaged-runtime.sh' /tmp/rpm-contents.txt
          {
            echo "## RPM Package Validation"
            echo ""
            echo "- Built: \`$(basename "$rpm_file")\`"
            echo "- Verified updater binary, user service, update-builder bundle, and packaged runtime helper."
          } >> "$GITHUB_STEP_SUMMARY"

  package-pacman:
    name: Build Pacman Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and inspect pacman package in Arch Linux
        run: |
          set -euo pipefail
          docker run --rm \
            -e CI_PACKAGE_VERSION="$CI_PACKAGE_VERSION" \
            -v "$PWD:/work" \
            -w /work \
            archlinux:base-devel \
            bash -lc '
              set -euo pipefail
              pacman -Syu --noconfirm --needed rust nodejs npm zstd sudo
              useradd -m builder
              chown -R builder:builder /work

              runuser -u builder -- bash -lc '"'"'
                set -euo pipefail
                rm -rf codex-app dist
                tests/fixtures/create-packaged-app-fixture.sh codex-app

                cargo build --release -p codex-app-updater
                PACKAGE_VERSION="$CI_PACKAGE_VERSION" ./scripts/build-pacman.sh

                pkg_file="$(find dist -maxdepth 1 -name "codex-app-*.pkg.tar.*" -print -quit)"
                test -n "$pkg_file"
                pacman -Qip "$pkg_file"
                pacman -Qlp "$pkg_file" | tee /tmp/pacman-contents.txt >/dev/null
                grep -q "usr/bin/codex-app-updater" /tmp/pacman-contents.txt
                grep -q "usr/lib/systemd/user/codex-app-updater.service" /tmp/pacman-contents.txt
                grep -q "usr/lib/codex-app/update-builder/install.sh" /tmp/pacman-contents.txt
                grep -q "usr/lib/codex-app/packaged-runtime.sh" /tmp/pacman-contents.txt
                printf "%s\n" "$(basename "$pkg_file")" > /tmp/pacman-package-name.txt
              '"'"'
              cp /tmp/pacman-package-name.txt /work/.pacman-package-name.txt
            '

      - name: Write pacman validation summary
        run: |
          set -euo pipefail
          pkg_file="$(cat .pacman-package-name.txt)"
          {
            echo "## Pacman Package Validation"
            echo ""
            echo "- Built: \`$pkg_file\`"
            echo "- Verified updater binary, user service, update-builder bundle, and packaged runtime helper."
          } >> "$GITHUB_STEP_SUMMARY"
