name: Update Nix official DMG hashes

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-nix-official-dmg-hashes
  cancel-in-progress: false

jobs:
  update-hash:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NIX_CONFIG: experimental-features = nix-command flakes
      CACHIX_CACHE_NAME: codex-app-linux
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Configure Cachix for hash refresh builds
        if: env.CACHIX_AUTH_TOKEN != ''
        uses: cachix/cachix-action@v17
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Install validation dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Refresh Nix official DMG hash
        run: scripts/ci/update-nix-hashes.sh

      - name: Commit refreshed hashes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if git diff --quiet -- flake.nix nix/native-modules/package.json nix/native-modules/package-lock.json; then
            echo "Nix pins unchanged, nothing to do."
            exit 0
          fi

          CODEX_DMG_HASH="$(scripts/ci/update-nix-hashes.sh read-flake-hash 'codexDmg = pkgs.fetchurl {' 'hash = ')"
          CODEX_VERSION="$(grep -m1 'codexVersion = ' flake.nix | sed 's/.*"\(.*\)".*/\1/')"

          git config user.name  "codex-dmg-hash-bot"
          git config user.email "actions@github.com"
          BRANCH="bot/update-codex-dmg-hash"
          git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH" || true
          git checkout -B "$BRANCH"
          git add flake.nix nix/native-modules/package.json nix/native-modules/package-lock.json
          git commit \
            -m "fix(nix): update official DMG hashes" \
            -m "Refreshed Codex.dmg SRI hash to $CODEX_DMG_HASH." \
            -m "Verified all Codex App Linux Nix package outputs against the refreshed DMG." \
            -m "[skip ci]" \
            -m "Co-authored-by: Codex <noreply@openai.com>"
          git push --force-with-lease origin "$BRANCH"

          PR_BODY="Refreshed Codex.dmg SRI hash to \`$CODEX_DMG_HASH\`.

          This scheduled workflow pushes refreshed hashes to \`$BRANCH\` and attempts to open or update a PR for maintainer review."

          PR_NUMBER="$(gh pr list --repo nisavid/codex-app-linux --base main --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          PR_ACTION_FAILED=0
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" \
              --repo nisavid/codex-app-linux \
              --title "fix(nix): update official DMG hashes" \
              --body "$PR_BODY" || PR_ACTION_FAILED=1
          else
            gh pr create \
              --repo nisavid/codex-app-linux \
              --base main \
              --head "$BRANCH" \
              --title "fix(nix): update official DMG hashes" \
              --body "$PR_BODY" || PR_ACTION_FAILED=1
          fi

          if [ "$PR_ACTION_FAILED" -ne 0 ]; then
            echo "::warning::Pushed refreshed hashes to $BRANCH, but could not create or update the PR."
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              {
                echo "### Hash update PR not created"
                echo
                echo "The workflow pushed refreshed hashes to \`$BRANCH\`, but the workflow token could not create or update the PR."
                echo "Open or update the PR manually from \`$BRANCH\`."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
