name: Update Nix official DMG hashes

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: update-nix-official-dmg-hashes
  cancel-in-progress: false

jobs:
  update-hash:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NIX_CONFIG: experimental-features = nix-command flakes
      CACHIX_CACHE_NAME: codex-app-linux
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Configure Cachix for hash refresh builds
        if: env.CACHIX_AUTH_TOKEN != ''
        uses: cachix/cachix-action@v17
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Install validation dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Refresh Nix official DMG hash
        run: CODEX_NIX_PIN_EVIDENCE_ENV="${RUNNER_TEMP:-/tmp}/codex-nix-pin-evidence.env" scripts/ci/update-nix-hashes.sh

      - name: Commit refreshed hashes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NIX_PIN_EVIDENCE_ENV="${RUNNER_TEMP:-/tmp}/codex-nix-pin-evidence.env"

          if git diff --quiet -- flake.nix nix/native-modules/package.json nix/native-modules/package-lock.json; then
            echo "Nix pins unchanged, nothing to do."
            exit 0
          fi

          if [ ! -s "$NIX_PIN_EVIDENCE_ENV" ]; then
            echo "Missing Nix pin evidence file: $NIX_PIN_EVIDENCE_ENV" >&2
            exit 1
          fi
          # shellcheck disable=SC1090
          source "$NIX_PIN_EVIDENCE_ENV"

          CODEX_DMG_HASH="$(scripts/ci/update-nix-hashes.sh read-flake-hash 'codexDmg = pkgs.fetchurl {' 'hash = ')"
          CODEX_VERSION="$(scripts/ci/update-nix-hashes.sh read-flake-string codexVersion)"
          APPCAST_VERSION="$(scripts/ci/update-nix-hashes.sh read-appcast-version 2>/dev/null || true)"
          if [ -n "$APPCAST_VERSION" ] && [ "$APPCAST_VERSION" != "$CODEX_VERSION" ]; then
            APPCAST_NOTE="- warning: Sparkle appcast currently advertises \`$APPCAST_VERSION\`, while current \`Codex.dmg\` contains \`$CODEX_VERSION\`; this PR follows the verified DMG payload."
          elif [ -n "$APPCAST_VERSION" ]; then
            APPCAST_NOTE="- Sparkle appcast also advertises \`$APPCAST_VERSION\`."
          else
            APPCAST_NOTE="- Sparkle appcast version could not be read during PR creation; pins follow the verified DMG payload."
          fi
          CODEX_DMG_SHA256="${CODEX_DMG_SHA256:-$(scripts/ci/hash-refresh-evidence.sh sri-to-hex "$CODEX_DMG_HASH")}"
          APPLE_VERIFICATION_URL="$(scripts/ci/hash-refresh-evidence.sh wait-apple-verification \
            --repo nisavid/codex-app-linux \
            --workflow verify-apple-dmg.yml \
            --ref main \
            --dmg-url https://persistent.oaistatic.com/codex-app-prod/Codex.dmg \
            --dmg-sha256 "$CODEX_DMG_SHA256")"
          PR_BODY_FILE="$(mktemp)"
          scripts/ci/hash-refresh-evidence.sh render-pr-body \
            --output "$PR_BODY_FILE" \
            --dmg-sri "$CODEX_DMG_HASH" \
            --dmg-sha256 "$CODEX_DMG_SHA256" \
            --app-version "${CODEX_APP_PACKAGE_VERSION:-$CODEX_VERSION}" \
            --app-build "${CODEX_APP_BUNDLE_VERSION:-unknown}" \
            --electron-version "${CODEX_ELECTRON_VERSION:-unknown}" \
            --better-sqlite3-version "${CODEX_NATIVE_BETTER_SQLITE3_VERSION:-unknown}" \
            --node-pty-version "${CODEX_NATIVE_NODE_PTY_VERSION:-unknown}" \
            --verification-url "$APPLE_VERIFICATION_URL" \
            --branch "bot/update-codex-dmg-hash"
          printf '\n%s\n' "$APPCAST_NOTE" >> "$PR_BODY_FILE"

          git config user.name  "codex-dmg-hash-bot"
          git config user.email "actions@github.com"
          BRANCH="bot/update-codex-dmg-hash"
          git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH" || true
          git checkout -B "$BRANCH"
          git add flake.nix nix/native-modules/package.json nix/native-modules/package-lock.json
          git commit \
            -m "fix(nix): update official DMG hashes${CODEX_VERSION:+ for $CODEX_VERSION}" \
            -m "Refreshed Codex.dmg SRI hash to $CODEX_DMG_HASH." \
            -m "Verified all Codex App Linux Nix package outputs against the refreshed DMG." \
            -m "Verified Apple DMG trust state in $APPLE_VERIFICATION_URL." \
            -m "[skip ci]" \
            -m "Co-authored-by: Codex <noreply@openai.com>"
          git push --force-with-lease origin "$BRANCH"

          PR_NUMBER="$(gh pr list --repo nisavid/codex-app-linux --base main --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          PR_ACTION_FAILED=0
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" \
              --repo nisavid/codex-app-linux \
              --title "fix(nix): update official DMG hashes${CODEX_VERSION:+ for $CODEX_VERSION}" \
              --body-file "$PR_BODY_FILE" || PR_ACTION_FAILED=1
          else
            gh pr create \
              --repo nisavid/codex-app-linux \
              --base main \
              --head "$BRANCH" \
              --title "fix(nix): update official DMG hashes${CODEX_VERSION:+ for $CODEX_VERSION}" \
              --body-file "$PR_BODY_FILE" || PR_ACTION_FAILED=1
          fi

          if [ "$PR_ACTION_FAILED" -ne 0 ]; then
            echo "::warning::Pushed refreshed hashes to $BRANCH, but could not create or update the PR."
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              {
                echo "### Hash update PR not created"
                echo
                echo "The workflow pushed refreshed hashes to \`$BRANCH\`, but the workflow token could not create or update the PR."
                echo "Open or update the PR manually from \`$BRANCH\`."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
