name: Updater

on:
  pull_request:
    paths:
      - Cargo.lock
      - Cargo.toml
      - install.sh
      - packaging/linux/**
      - scripts/**
      - tests/**/*.sh
      - updater/**
      - .github/workflows/updater.yml
  push:
    branches:
      - main
    paths:
      - Cargo.lock
      - Cargo.toml
      - install.sh
      - packaging/linux/**
      - scripts/**
      - tests/**/*.sh
      - updater/**
      - .github/workflows/updater.yml

permissions:
  contents: read

jobs:
  check:
    name: Check and test updater
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --no-self-update

      - name: Check updater
        run: cargo +1.95.0 check -p codex-app-updater --locked

      - name: Test updater
        run: cargo +1.95.0 test -p codex-app-updater --locked

      - name: Check shell scripts
        run: |
          find install.sh scripts tests packaging/linux -type f \( -name '*.sh' -o -name '*.bash' \) -print0 |
            xargs -0 -r -n1 bash -n
