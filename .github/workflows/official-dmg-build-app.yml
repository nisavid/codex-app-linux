name: Official DMG Build App

on:
  schedule:
    - cron: '30 6 * * *'
  pull_request:
    paths:
      - install.sh
      - Makefile
      - launcher/**
      - computer-use-linux/**
      - plugins/**
      - packaging/linux/**
      - scripts/**
      - .github/workflows/official-dmg-build-app.yml
  push:
    branches:
      - main
    paths:
      - install.sh
      - Makefile
      - launcher/**
      - computer-use-linux/**
      - plugins/**
      - packaging/linux/**
      - scripts/**
      - .github/workflows/official-dmg-build-app.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  OFFICIAL_DMG_URL: https://persistent.oaistatic.com/codex-app-prod/Codex.dmg
  OFFICIAL_DMG_PATH: /tmp/codex-official-dmg-ci/Codex.dmg
  DMG_CACHE_SCHEMA_VERSION: v1

jobs:
  build-app-official-dmg:
    name: Build App Against Official DMG
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y p7zip-full make g++ python3 curl unzip

      - name: Capture official DMG metadata
        id: official-metadata
        run: |
          set -euo pipefail

          headers_file="$(mktemp)"
          trap 'rm -f "$headers_file"' EXIT

          curl -fsSLI "$OFFICIAL_DMG_URL" > "$headers_file"

          last_modified="$(awk 'tolower($0) ~ /^last-modified:/ {sub(/\r$/,""); sub(/^[^:]+: /,""); value=$0} END{print value}' "$headers_file")"
          etag="$(awk 'tolower($0) ~ /^etag:/ {sub(/\r$/,""); sub(/^[^:]+: /,""); gsub(/"/,""); value=$0} END{print value}' "$headers_file")"
          content_length="$(awk 'tolower($0) ~ /^content-length:/ {sub(/\r$/,""); sub(/^[^:]+: /,""); value=$0} END{print value}' "$headers_file")"

          if [ -z "$last_modified" ]; then
            last_modified="unknown"
          fi
          if [ -z "$etag" ]; then
            etag="no-etag"
          fi
          if [ -z "$content_length" ]; then
            content_length="unknown"
          fi

          cache_segment="$(printf '%s|%s|%s\n' "$last_modified" "$etag" "$content_length" | sha256sum | cut -d' ' -f1)"

          {
            echo "last_modified=$last_modified"
            echo "etag=$etag"
            echo "content_length=$content_length"
            echo "cache_segment=$cache_segment"
          } >> "$GITHUB_OUTPUT"

      - name: Restore cached official DMG
        id: dmg-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.OFFICIAL_DMG_PATH }}
          key: official-dmg-${{ env.DMG_CACHE_SCHEMA_VERSION }}-${{ steps.official-metadata.outputs.cache_segment }}

      - name: Download official DMG
        if: steps.dmg-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$OFFICIAL_DMG_PATH")"
          curl -fL --retry 3 -o "$OFFICIAL_DMG_PATH" "$OFFICIAL_DMG_URL"

      - name: Record local DMG fingerprint
        id: local-dmg
        run: |
          set -euo pipefail

          test -s "$OFFICIAL_DMG_PATH"

          dmg_sha256="$(sha256sum "$OFFICIAL_DMG_PATH" | cut -d' ' -f1)"
          dmg_size_bytes="$(stat -c '%s' "$OFFICIAL_DMG_PATH")"
          tested_at_utc="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "sha256=$dmg_sha256"
            echo "size_bytes=$dmg_size_bytes"
            echo "tested_at_utc=$tested_at_utc"
          } >> "$GITHUB_OUTPUT"

          cat > official-dmg-metadata.json <<JSON
          {
            "url": "$OFFICIAL_DMG_URL",
            "path": "$OFFICIAL_DMG_PATH",
            "last_modified": "${{ steps.official-metadata.outputs.last_modified }}",
            "etag": "${{ steps.official-metadata.outputs.etag }}",
            "content_length": "${{ steps.official-metadata.outputs.content_length }}",
            "sha256": "$dmg_sha256",
            "size_bytes": "$dmg_size_bytes",
            "tested_at_utc": "$tested_at_utc",
            "cache_schema_version": "${{ env.DMG_CACHE_SCHEMA_VERSION }}"
          }
          JSON

      - name: Build app from official DMG
        run: |
          set -euo pipefail
          CODEX_PATCH_REPORT_JSON="$GITHUB_WORKSPACE/patch-report.json" \
            make build-app DMG="$OFFICIAL_DMG_PATH"
          node scripts/ci/validate-patch-report.js patch-report.json --profile official-dmg-build

      - name: Upload official DMG metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: official-dmg-metadata
          path: official-dmg-metadata.json

      - name: Write build summary
        run: |
          {
            echo "## Official DMG Build App"
            echo ""
            echo "- DMG URL: \`$OFFICIAL_DMG_URL\`"
            echo "- DMG Last-Modified: \`${{ steps.official-metadata.outputs.last_modified }}\`"
            echo "- DMG ETag: \`${{ steps.official-metadata.outputs.etag }}\`"
            echo "- DMG Content-Length: \`${{ steps.official-metadata.outputs.content_length }}\`"
            echo "- DMG SHA-256: \`${{ steps.local-dmg.outputs.sha256 }}\`"
            echo "- DMG Size (bytes): \`${{ steps.local-dmg.outputs.size_bytes }}\`"
            echo "- Tested At (UTC): \`${{ steps.local-dmg.outputs.tested_at_utc }}\`"
            echo "- Cache Hit: \`${{ steps.dmg-cache.outputs.cache-hit || 'false' }}\`"
            echo "- Build command: \`make build-app DMG=$OFFICIAL_DMG_PATH\`"
          } >> "$GITHUB_STEP_SUMMARY"
