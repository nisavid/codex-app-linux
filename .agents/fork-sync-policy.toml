version = 1

# In this config, "upstream" means the Linux-port upstream remote for
# ilysenko/codex-desktop-linux. The official OpenAI Codex DMG is not this
# upstream surface.
[upstream]
direct_remote = "upstream"
direct_branch = "main"
target_remote = "origin"
target_branch = "main"
baseline_source = "docs/maintainers/fork-divergences.md"
required_merge_method = "merge_commit"
preserve_upstream_commit_identity = true

[policy]
canonical_inventory = "docs/maintainers/fork-divergences.md"
rename_map = "docs/maintainers/fork-divergences.md#current-local-rename-and-compatibility-map"
sync_procedure = "docs/maintainers/fork-sync-policy.md"
sync_ledger = "docs/maintainers/fork-sync-ledger/"
uncertainty_destination = "operator escalation or durable discoverable follow-up"
sync_ledger_required = true
in_tree_sync_ledger_required = true
renamed_path_reconciliation_required = true
policy_gap_closeout_required = true
operator_escalation_required_for_uncertainty = true
durable_followup_required_when_escalation_unavailable = true
pr_body_only_uncertainty_record_disallowed = true
github_pr_repo = "nisavid/codex-app-linux"
github_pr_commands_require_explicit_repo = true
read_before_conflict_resolution = [
  "AGENTS.md",
  "docs/maintainers/fork-divergences.md",
  "docs/maintainers/fork-sync-policy.md",
]

[local_gates]
before_push_build_gate = true
dmg_freshness_hours = 24
minimum_app_build_command_one_of = ["make build-app", "./install.sh"]
package_payload_changes_require_package_builder = true
release_workflow_changes_require_release_gate = true
ci_is_secondary_evidence = true

[docs_review]
upstream_user_facing_docs_review_required = true
compare_upstream_docs = [
  "README.md",
]
local_user_facing_docs = [
  "README.md",
  "docs/usage/build-and-run.md",
  "docs/usage/troubleshooting.md",
]
classify_readme_relevant_additions = [
  "adapted under local contracts",
  "already covered",
  "intentionally omitted",
  "follow-up",
]

[fork_contracts]
preserve_local_identity = true
preserve_xdg_fhs_layout = true
preserve_dmg_bundle_versioning = true
preserve_unprivileged_updater_boundary = true
preserve_package_payload_shape = true
preserve_security_and_supply_chain_gates = true
canonical_contract_list = "docs/maintainers/fork-divergences.md#divergence-inventory"
